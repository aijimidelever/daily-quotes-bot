<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #faf9f8;
    color: #333;
    line-height: 1.8;
    padding: 20px;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 40px 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .header {
    text-align: center;
    padding-bottom: 24px;
    margin-bottom: 30px;
    border-bottom: 1px solid #eee;
  }
  .date { font-size: 13px; color: #999; letter-spacing: 2px; margin-bottom: 8px; }
  .article-title {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.4;
    color: #222;
    margin-bottom: 6px;
  }
  .theme-tag {
    display: inline-block;
    padding: 3px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: #fff;
  }
  .theme-courage-growth { background: #e74c3c; }
  .theme-love-loneliness { background: #e91e63; }
  .theme-life-wisdom { background: #4caf50; }
  .theme-dreams-perseverance { background: #ff9800; }
  .theme-biographies { background: #2196f3; }

  .content {
    font-size: 16px;
    line-height: 2;
    letter-spacing: 0.5px;
    color: #444;
  }
  .content p { margin-bottom: 20px; text-indent: 2em; }
  .content h2 {
    font-size: 19px;
    margin: 32px 0 16px;
    padding-left: 14px;
    border-left: 4px solid;
    font-weight: 600;
    color: #333;
    text-indent: 0;
  }
  .content blockquote {
    margin: 20px 0;
    padding: 16px 20px;
    background: #f5f2f0;
    border-radius: 8px;
    border-left: 4px solid #d4a574;
    font-style: italic;
    color: #666;
    text-indent: 0;
  }
  .content blockquote .source {
    display: block;
    text-align: right;
    margin-top: 8px;
    font-size: 13px;
    color: #999;
    font-style: normal;
  }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    text-align: center;
    font-size: 12px;
    color: #bbb;
    letter-spacing: 1px;
  }

  @media (max-width: 480px) {
    .container { padding: 24px 16px; }
    .article-title { font-size: 19px; }
    .content { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="date">{{date}}</div>
    <div class="article-title">{{title}}</div>
    <span class="theme-tag {{theme_class}}">{{theme_name}}</span>
  </div>
  <div class="content">
    {{article_content}}
  </div>
  <div class="footer">— 每日一摘 · 周末深度 —</div>
</div>
</body>
</html>
